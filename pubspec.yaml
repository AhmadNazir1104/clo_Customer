name: khayyat
description: "Khayyat — Your tailor, your boutique, your marketplace."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  pinput: ^6.0.2
  image_picker: ^1.2.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  flutter_riverpod: ^3.3.1
  firebase_app_check: ^0.4.2
  go_router: ^14.0.0
  cached_network_image: ^3.4.1
  material_symbols_icons: ^4.2906.0
  flutter_svg: ^2.2.4
  flutter_image_compress: ^2.3.0
  record: ^6.2.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  uuid: ^4.5.3
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_images/app_icon3.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/app_images/
